# Configuración para desarrollo local
 spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/meowfit}
# Cambia el valor de DB_USER y DB_PASS en tu entorno local si es necesario
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
# spring.datasource.password=${DB_PASS:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# Origen permitido para CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}